name = "bugscraper"
default_targets = ["win64", "macos", "appimage"]
build_directory = "_export"
icon_file = "icon.png"

# LÖVE version - makelove will auto-download and cache binaries for this version
love_version = "11.5"

love_files = [
    "+*",
    "-*/.*",
    "-./_*",
    "-./_export",
    "-*.aseprite",
    "-*.lnk",
    "-*.dll",
    "-*.so",
    "-*.dylib",

    "-./luasteam.dll",
    "-./steam_api64.dll",
]

[archive_files]
"changes.md" = "changes.md"

# Windows configuration - no manual love_binaries needed!
[windows.archive_files]
"steam_appid.txt" = "steam_appid.txt"
"luasteam.dll" = "luasteam.dll"
"steam_api64.dll" = "steam_api64.dll"
"steam_api64.lib" = "steam_api64.lib"

[windows.exe_metadata]
FileDescription = "Bugscraper: Rise to the top of a bug-filled skyscraper"
FileVersion = "0.4.2"
CompanyName = "Léo Bernard"
LegalCopyright = "Copyright © 2026 Léo Bernard"
ProductName = "Bugscraper"
OriginalFilename = "bugscraper.exe"

# macOS configuration - no manual love_binaries needed!
[macos]
icon_file = "icon.png"

[macos.archive_files]
"steam_appid.txt" = "@content/steam_appid.txt"
"luasteam.so" = "@content/luasteam.so"
"libsteam_api.dylib" = "@content/libsteam_api.dylib"

[macos.app_metadata]
CFBundleIdentifier = "com.yolwoocle.bugscraper"
NSHumanReadableCopyright = "Copyright © 2026 Léo Bernard"

# Linux/AppImage configuration - no manual source_appimage needed!
[appimage]
shared_libraries = [
    "libsteam_api.so",
    "luasteam.so",
]

[linux.archive_files]
"steam_appid.txt" = "@content/steam_appid.txt"

[linux.desktop_file_metadata]
Comment="Bugscraper: Rise to the top of a bug-filled skyscraper"
Categories="Game;"

[lovejs]
title = "Bugscraper"
memory = "40000000"
